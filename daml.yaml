sdk-version: 3.4.0
name: fixed-rate-lending
version: 0.1.0
source: daml
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
  - daml-finance-interface
  - daml-finance-lifecycle
  - daml-finance-contingent-claims
data:
  # Canton token standard (CIP-0056) for collateral
  - location: ".dpm/packages/canon-token/canon-token-1.0.0.dar"
    alias: canon-token
    version: 1.0.0
exposed-modules:
  - FixedRateLending.Borrow
  - FixedRateLending.Collateral
  - FixedRateLending.Lend
  - FixedRateLending.Market
  - FixedRateLending.Maturity
  - FixedRateLending.Role
  - FixedRateLending.Types
build-options: ["--target=2.1"]