name: Canton Fixed-Rate Lending CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install DPM (Daml Package Manager)
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to system PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Build Daml project
        run: dpm build

      - name: Run Daml tests
        run: dpm test